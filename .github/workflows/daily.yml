name: Rakuten Daily Ranking

on:
  schedule:
    # 09:00 KST = 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ranking:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install system dependencies for Playwright
        run: |
          sudo apt-get install -y \
            libasound2t64 libatk-bridge2.0-0 libatk1.0-0 libatspi2.0-0 \
            libcairo2 libcups2 libdbus-1-3 libdrm2 libexpat1 libgbm1 \
            libglib2.0-0 libgtk-3-0 libnspr4 libnss3 libpango-1.0-0 \
            libx11-6 libxcb1 libxcomposite1 libxdamage1 libxext6 \
            libxfixes3 libxkbcommon0 libxrandr2 libxshmfence1

      - name: Install Playwright browsers
        run: playwright install chromium

      - name: Run bot
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
        run: python main.py
